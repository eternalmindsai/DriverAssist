name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Fix gradle.properties
        run: |
          echo "android.useAndroidX=true" >> DriverAssist2/gradle.properties
          echo "android.enableJetifier=true" >> DriverAssist2/gradle.properties

      - name: Generate Gradle Wrapper
        run: |
          cd DriverAssist2
          gradle wrapper

      - name: Build Debug APK
        run: |
          cd DriverAssist2
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DriverAssist-debug
          path: DriverAssist2/app/build/outputs/apk/debug/app-debug.apk
