name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Fix gradle.properties
        run: |
          echo "android.useAndroidX=true" >> DriverAssist2/gradle.properties
          echo "android.enableJetifier=true" >> DriverAssist2/gradle.properties

      - name: Generate launcher icons
        run: |
          sudo apt-get install -y imagemagick
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p DriverAssist2/app/src/main/res/$dir
            convert -size 192x192 xc:#1E6FD9 \
              -fill white -font DejaVu-Sans-Bold -pointsize 72 \
              -gravity center -annotate 0 "DA" \
              DriverAssist2/app/src/main/res/$dir/ic_launcher.png
            cp DriverAssist2/app/src/main/res/$dir/ic_launcher.png \
               DriverAssist2/app/src/main/res/$dir/ic_launcher_round.png
          done

      - name: Generate Gradle Wrapper
        run: |
          cd DriverAssist2
          gradle wrapper

      - name: Build Debug APK
        run: |
          cd DriverAssist2
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DriverAssist-debug
          path: DriverAssist2/app/build/outputs/apk/debug/app-debug.apk
